<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop Products - AnishShop</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="toast" id="toast"></div>
  <header class="navbar sticky">
    <div class="container nav-inner">
      <a href="index.html" class="logo">ANISH<span>Shop</span></a>
      <div class="search-bar">
        <input id="searchInput" type="search" placeholder="Search products..." autocomplete="off" />
        <div class="suggestions" id="suggestions"></div>
      </div>
      <div class="nav-links">
        <select id="categoryFilter" class="nav-dropdown">
          <option value="">All Categories</option>
          <option value="Electronics">Electronics</option>
          <option value="Smart Home">Smart Home</option>
          <option value="Office">Office</option>
          <option value="Wearables">Wearables</option>
          <option value="Gaming">Gaming</option>
          <option value="Home">Home</option>
        </select>
        <a href="wishlist.html" class="nav-button">Wishlist</a>
        <a href="order-history.html" class="nav-button">Orders</a>
        <a href="#authModal" class="nav-button" id="loginTrigger">Login / Register</a>
        <a href="cart.html" class="nav-button">Cart <span id="cartCount">0</span></a>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container grid-4 gap-xl page-grid">
      <aside class="filters-panel">
        <h3>Filters</h3>
        <div class="filter-group">
          <label>Category</label>
          <select id="panelCategory">
            <option value="">All</option>
            <option value="Electronics">Electronics</option>
            <option value="Smart Home">Smart Home</option>
            <option value="Office">Office</option>
            <option value="Wearables">Wearables</option>
            <option value="Gaming">Gaming</option>
            <option value="Home">Home</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Price range</label>
          <input type="number" id="minPrice" placeholder="Min" />
          <input type="number" id="maxPrice" placeholder="Max" />
        </div>
        <div class="filter-group">
          <label>Rating</label>
          <select id="minRating">
            <option value="">Any</option>
            <option value="4">4.0+</option>
            <option value="4.5">4.5+</option>
            <option value="5">5.0</option>
          </select>
        </div>
        <button id="applyFilters" class="button button--secondary">Apply Filters</button>
      </aside>

      <section class="product-listing">
        <div class="section-header">
          <h2>Shop products</h2>
          <div class="sort-row">
            <label>Sort by</label>
            <select id="sortOrder">
              <option value="">Latest</option>
              <option value="low">Price low to high</option>
              <option value="high">Price high to low</option>
            </select>
          </div>
        </div>
        <div id="productGrid" class="product-grid"></div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-grid">
      <div>
        <h3>About AnishShop</h3>
        <p>A premium shopping experience with curated products and useful features.</p>
      </div>
      <div>
        <h4>Links</h4>
        <a href="index.html">Home</a>
        <a href="#">Contact</a>
        <a href="#">Help</a>
      </div>
    </div>
  </footer>

  <div class="modal" id="authModal">
    <div class="modal-content">
      <button class="modal-close" id="closeModal">×</button>
      <div class="auth-tabs">
        <button data-tab="login" class="tab active">Login</button>
        <button data-tab="register" class="tab">Register</button>
      </div>
      <form id="authForm" class="auth-form"></form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
