<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart - AnishShop</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="toast" id="toast"></div>
  <header class="navbar sticky">
    <div class="container nav-inner">
      <a href="index.html" class="logo">ANISH<span>Shop</span></a>
      <div class="search-bar">
        <input id="searchInput" type="search" placeholder="Search products..." autocomplete="off" />
        <div class="suggestions" id="suggestions"></div>
      </div>
      <div class="nav-links">
        <select id="categoryFilter" class="nav-dropdown">
          <option value="">All Categories</option>
          <option value="Electronics">Electronics</option>
          <option value="Smart Home">Smart Home</option>
          <option value="Office">Office</option>
          <option value="Wearables">Wearables</option>
          <option value="Gaming">Gaming</option>
          <option value="Home">Home</option>
        </select>
        <a href="wishlist.html" class="nav-button">Wishlist</a>
        <a href="order-history.html" class="nav-button">Orders</a>
        <a href="#authModal" class="nav-button" id="loginTrigger">Login / Register</a>
        <a href="cart.html" class="nav-button">Cart <span id="cartCount">0</span></a>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container cart-page">
      <h2>Your Shopping Cart</h2>
      <div class="cart-layout">
        <div id="cartItems" class="cart-items"></div>
        <aside class="order-summary">
          <div class="summary-card">
            <h3>Order Summary</h3>
            <div class="summary-row">
              <span>Subtotal</span>
              <strong id="cartSubtotal">₹0.00</strong>
            </div>
            <div class="summary-row">
              <span>Estimated delivery</span>
              <span>3–5 days</span>
            </div>
            <button id="checkoutBtn" class="button button--primary">Proceed to Checkout</button>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-grid">
      <div>
        <h3>About AnishShop</h3>
        <p>Flexible shopping and secure checkout for modern customers.</p>
      </div>
      <div>
        <h4>Links</h4>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="checkout.html">Checkout</a>
      </div>
    </div>
  </footer>

  <div class="modal" id="authModal">
    <div class="modal-content">
      <button class="modal-close" id="closeModal">×</button>
      <div class="auth-tabs">
        <button data-tab="login" class="tab active">Login</button>
        <button data-tab="register" class="tab">Register</button>
      </div>
      <form id="authForm" class="auth-form"></form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
